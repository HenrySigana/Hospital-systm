<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Dashboard</title>

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Mobile Sidebar Toggle -->
  <button class="sidebar-toggle">☰ Menu</button>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🏥 Hospital</h2>
    <ul>
      <li><a href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="#"><i class="fas fa-user-injured"></i> Patients</a></li>
      <li><a href="#"><i class="fas fa-user-nurse"></i> Staff</a></li>
      <li><a href="#"><i class="fas fa-calendar-check"></i> Appointments</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="header">
      <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
      <button class="btn-primary" id="addPatientBtn"><i class="fas fa-plus"></i> Add Patient</button>
    </div>

    <div class="dashboard-grid">
      <div class="card"><i class="fas fa-user-injured"></i> Total Patients: 120</div>
      <div class="card"><i class="fas fa-user-nurse"></i> Staff On Duty: 35</div>
      <div class="card"><i class="fas fa-calendar-check"></i> Appointments Today: 15</div>
    </div>

    <div class="card">
      <h2><i class="fas fa-user-injured"></i> Patients List</h2>
      <input type="text" id="patientSearch" placeholder="Search patients..." class="search-input">

      <table class="table" id="patientTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Admission Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>P001</td>
            <td>John Doe</td>
            <td>34</td>
            <td>Male</td>
            <td>2026-03-01</td>
            <td>
              <button class="btn-primary"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-danger"><i class="fas fa-trash"></i> Delete</button>
            </td>
          </tr>
          <tr>
            <td>P002</td>
            <td>Jane Smith</td>
            <td>28</td>
            <td>Female</td>
            <td>2026-03-02</td>
            <td>
              <button class="btn-primary"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-danger"><i class="fas fa-trash"></i> Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add Patient Modal -->
  <div id="addPatientModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2><i class="fas fa-user-injured"></i> Add Patient</h2>
      <form id="addPatientForm">
        <label for="patientId">Patient ID</label>
        <input type="text" id="patientId" name="patientId" required>

        <label for="patientName">Name</label>
        <input type="text" id="patientName" name="patientName" required>

        <label for="patientAge">Age</label>
        <input type="number" id="patientAge" name="patientAge" required>

        <label for="patientGender">Gender</label>
        <select id="patientGender" name="patientGender" required>
          <option value="">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>

        <label for="admissionDate">Admission Date</label>
        <input type="date" id="admissionDate" name="admissionDate" required>

        <button type="submit" class="btn-primary"><i class="fas fa-plus"></i> Add Patient</button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
